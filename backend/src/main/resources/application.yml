spring:
  application:
    name: backend

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chronos_db}
    username: ${DB_USERNAME:chronos_user}
    password: ${DB_PASSWORD:chronos_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 2000
      validation-timeout: 1000
      max-lifetime: 600000
      maximum-pool-size: 10

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0
        prefetch: 1
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        multiplier: 2.0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: ${REDIS_TIMEOUT:2000ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:1000ms}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${OAUTH2_CLIENT_ID:chronos-api}
            client-secret: ${OAUTH2_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/auth/oauth2/callback"
            scope: openid,profile,email,roles
        provider:
          keycloak:
            authorization-uri: ${app.keycloak.base-url}/protocol/openid-connect/auth
            token-uri: ${app.keycloak.base-url}/protocol/openid-connect/token
            user-info-uri: ${app.keycloak.base-url}/protocol/openid-connect/userinfo
            jwk-set-uri: ${app.keycloak.base-url}/protocol/openid-connect/certs
            user-name-attribute: preferred_username

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        default_schema: ${app.database.schema}

  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    default-schema: ${app.database.schema}
    schemas: ${app.database.schema}
    placeholders:
      app_schema: ${app.database.schema}

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      keycloak:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      rabbitmq:
        baseConfig: default

server:
  port: 8081
  forward-headers-strategy: framework

app:
  keycloak:
    # Ajuste este valor se seu Keycloak usar o prefixo /auth (ex: http://localhost:8080/auth/realms/master)
    # E confirme se o nome do realm é realmente 'master'
    base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080/realms/master}

  database:
    schema: ${APP_DB_SCHEMA:chronos_app}

  security:
    permit-all: false
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
      allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,X-Correlation-Id}
      exposed-headers: ${CORS_EXPOSED_HEADERS:X-Correlation-Id}
      allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    jwt:
      secret: ${JWT_SECRET}
      access-ttl-minutes: ${JWT_ACCESS_TTL:15}
      refresh-ttl-days: ${JWT_REFRESH_TTL:7}
      cookie-secure: ${JWT_COOKIE_SECURE:false}
      cookie-same-site: ${JWT_COOKIE_SAME_SITE:Strict}
      issuer: ${JWT_ISSUER:chronos-api}
    password-encoder:
      salt-length: ${ARGON2_SALT_LENGTH:16}
      hash-length: ${ARGON2_HASH_LENGTH:32}
      parallelism: ${ARGON2_PARALLELISM:1}
      memory: ${ARGON2_MEMORY:65536}
      iterations: ${ARGON2_ITERATIONS:3}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  file:
    path: ./logs
  level:
    root: INFO
    com.caelum.chronos: DEBUG
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
