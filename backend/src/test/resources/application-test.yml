spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chronos_db}
    username: ${DB_USERNAME:chronos_user}
    password: ${DB_PASSWORD:chronos_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${app.database.schema}

  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    default-schema: ${app.database.schema}
    schemas: ${app.database.schema}
    placeholders:
      app_schema: ${app.database.schema}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/chronos/protocol/openid-connect/certs
      client:
        registration:
          keycloak:
            client-id: chronos-api
            client-secret: secret
            authorization-grant-type: authorization_code
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/chronos

app:
  database:
    schema: chronos_app_test

  security:
    jwt:
      secret: "test-secret-test-secret-test-secret-test-secret"
      access-ttl-minutes: 15
      refresh-ttl-days: 7
      cookie-secure: false
      cookie-same-site: Strict
      issuer: chronos-api

logging:
  level:
    root: INFO
    com.caelum.chronos: DEBUG
